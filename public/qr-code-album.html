<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Photo Album</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ECE7D1;
            --text: #3D3228;
            --text-dim: rgba(61, 50, 40, 0.68);
            --gold: #8A7650;
            --gold-dim: #6B7360;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .qr-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            max-width: 380px;
            border: 1px solid rgba(138, 118, 80, 0.2);
        }
        
        .bismillah {
            font-family: 'Aref Ruqaa', serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            direction: rtl;
        }
        
        .names-ar {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2.5rem;
            color: var(--gold);
            direction: rtl;
            margin-bottom: 0.25rem;
        }
        
        .names-en {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }
        
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        
        .qr-wrapper {
            background: white;
            padding: 1rem;
            border-radius: 4px;
            display: inline-block;
            margin: 1rem 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        
        .qr-wrapper img {
            display: block;
            width: 200px;
            height: 200px;
        }
        
        .instructions {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            color: var(--text-dim);
            font-size: 1rem;
            margin-top: 1.5rem;
            line-height: 1.8;
        }
        
        .url {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: var(--gold);
            font-size: 0.75rem;
            margin-top: 1rem;
            letter-spacing: 0.05em;
        }
        
        .camera-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem auto 0;
            width: fit-content;
        }
        
        .divider-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim));
        }
        
        .divider-line:last-child {
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }
        
        .divider-star {
            width: 6px;
            height: 6px;
            position: relative;
        }
        
        .divider-star::before,
        .divider-star::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 1px;
            background: var(--gold-dim);
        }
        
        .divider-star::before { transform: translate(-50%, -50%) rotate(0deg); }
        .divider-star::after { transform: translate(-50%, -50%) rotate(90deg); }
        
        .hashtag {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: var(--gold);
            font-size: 0.85rem;
            margin-top: 1rem;
            letter-spacing: 0.05em;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .qr-card {
                box-shadow: none;
                border: 1px solid var(--gold);
            }
        }
    </style>
</head>
<body>
    <div class="qr-card">
        <p class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
        <h1 class="names-ar">محمود و رنيم</h1>
        <h2 class="names-en">Mahmoud & Ranim</h2>
        <p class="subtitle">Share Photos & Videos · شاركوا الصور</p>
        
        <div class="camera-icon">📷</div>
        
        <div class="qr-wrapper">
            <img 
                src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://photos.app.goo.gl/NdQ25MoYWbPVSLuu9&color=3D3228" 
                alt="QR Code to photo album"
            >
        </div>
        
        <p class="instructions">
            Scan to open the photo album<br>
            and share your pictures & videos
        </p>
        
        <p class="url">photos.app.goo.gl</p>
        
        <p class="hashtag">#MahmoudOgRanim</p>
        
        <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-star"></span>
            <span class="divider-line"></span>
        </div>
        
        <p class="hashtag">28 · March · 2026</p>
    </div>
</body>
</html>
